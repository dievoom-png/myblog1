# Blowfish theme parameters
# Full reference: https://blowfish.page/docs/configuration/

colorScheme = "deep-purple"
defaultAppearance = "dark"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true
disableImageZoom = false  # click any content image to zoom (medium-zoom)

# OG/Twitter card fallback when a post has no featured.* image (every current
# post has one = its first image). Name an image `featured.*` in a post bundle
# and it becomes the card thumbnail, hero, AND social share image.
defaultSocialImage = "img/og-card.png"  # branded fallback share card; posts keep their own featured.* (source: assets/img/og-card.svg)

mainSections = ["posts"]

disableImageOptimization = false

highlightCurrentMenuArea = true
smartTOC = true

[header]
  layout = "fixed-fill-blur"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = false
  cardViewScreenWidth = false

[article]
  showDate = true
  showAuthor = true
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showZenMode = true
  sharingLinks = ["linkedin", "twitter", "reddit", "email"]
  showRelatedContent = true
  relatedContentLimit = 3
  seriesOpened = false
  showComments = true  # giscus configured below

[list]
  showHero = false
  showBreadcrumbs = true
  showSummary = true
  showTableOfContents = false
  showCards = false
  groupByYear = true
  cardView = false
  cardViewScreenWidth = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true

[term]
  showBreadcrumbs = true
  showTableOfContents = false
  groupByYear = false
  cardView = false

# --- Comments (giscus) ---
# Two switches must both be on for comments to appear:
#   1. article.showComments = true  (above)
#   2. giscus.repo + IDs filled in  (below) — the partial self-gates on repo
# Setup: make the repo public → enable Discussions → install the giscus app
# (https://github.com/apps/giscus) → get IDs from https://giscus.app
# Disable on a single post with `showComments: false` in its front matter.

[giscus]
  repo = "dievoom-png/myblog1"
  repoId = "R_kgDOJncI_A"
  category = "Announcements"
  categoryId = "DIC_kwDOJncI_M4DAajk"
  mapping = "pathname"
  reactionsEnabled = 1
  emitMetadata = 0
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "en"
