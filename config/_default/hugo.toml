baseURL = "https://blog.yahyaayman.com/"
defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 30

buildDrafts = false
buildFuture = false

ignoreErrors = ["error-remote-getjson"]

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false
  [[related.indices]]
    name = "series"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "categories"
    weight = 60

[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"
